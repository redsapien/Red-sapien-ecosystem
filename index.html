<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Ecosistema Digital de Alta Conversión. Implementamos maquinaria de ventas automatizada para negocios con resultados reales.">
    <meta name="theme-color" content="#050505">
    
    <title>Ecosistema Red Sapien | Alta Conversión</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23050505' stroke='%23FF3C00' stroke-width='4'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='40' fill='%23FF3C00'%3ERS%3C/text%3E%3C/svg%3E">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rs: {
                            black: '#050505',
                            dark: '#0a0a0a',
                            gray: '#171717',
                            red: '#FF3C00',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'bullet-train': 'scroll 40s linear infinite',
                        'fade-out': 'fadeOut 0.6s ease-out forwards',
                        'pulse-col': 'pulseCol 2s ease-in-out infinite',
                        'spin-slow': 'spin 3s linear infinite',
                    },
                    keyframes: {
                        scroll: { 
                            '0%': { transform: 'translateX(0)' }, 
                            '100%': { transform: 'translateX(-50%)' } 
                        },
                        fadeOut: { 
                            '0%': { opacity: '1', visibility: 'visible' }, 
                            '100%': { opacity: '0', visibility: 'hidden' } 
                        },
                        pulseCol: { 
                            '0%, 100%': { opacity: '0.7', transform: 'scaleY(1)' }, 
                            '50%': { opacity: '1', transform: 'scaleY(1.2)' } 
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden; 
        }
        
        .bg-subtle-red { 
            background: radial-gradient(circle at 50% -20%, rgba(255, 60, 0, 0.08), transparent 70%); 
        }
        
        .colombia-border { 
            height: 3px; 
            width: 100%; 
            background: linear-gradient(90deg, #FCD116 33%, #003893 33% 66%, #CE1126 66%); 
            transform-origin: top;
        }
        
        #mobile-menu { 
            transition: opacity 0.4s ease, visibility 0.4s ease; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%); 
        }
        
        .neon-border { transition: all 0.3s ease; }
        .neon-border:hover { box-shadow: 0 0 20px rgba(255, 60, 0, 0.3); border-color: #FF3C00; }
        
        /* Slider de imágenes */
        .logo-track { display: flex; width: max-content; gap: 4rem; }
        .logo-item { filter: grayscale(100%) opacity(0.6); transition: 0.3s; }
        .logo-item:hover { filter: grayscale(0%) opacity(1); }

        /* Navbar Dinámico */
        #main-nav { transition: background-color 0.4s ease, backdrop-filter 0.4s ease, box-shadow 0.4s ease; }
    </style>
</head>

<body class="font-sans">

    <div id="preloader" class="fixed inset-0 z-[9999] bg-rs-black flex flex-col justify-center items-center transition-opacity duration-500">
        <div class="relative w-24 h-24 flex items-center justify-center mb-6">
            <div class="absolute w-full h-full border-t-4 border-rs-red rounded-full animate-spin-slow"></div>
            <span class="text-2xl font-bold font-display text-white">RS</span>
        </div>
        <div class="text-[10px] uppercase tracking-[0.3em] text-gray-500">Iniciando Ecosistema...</div>
    </div>

    <header class="fixed top-0 w-full z-50">
        <div class="colombia-border animate-pulse-col"></div>
        
        <nav id="main-nav" class="px-6 py-4 md:px-12 flex justify-between items-center bg-transparent">
            <div class="flex items-center">
                <select id="lang-selector" onchange="changeLanguage(this.value)" class="bg-transparent text-xs font-bold text-gray-400 outline-none cursor-pointer border-none focus:ring-0">
                    <option value="es">ES</option>
                    <option value="en">EN</option>
                    <option value="pt">PT</option>
                </select>
            </div>

            <button id="menu-trigger" class="p-2 hover:bg-white/10 rounded-lg transition-all text-white focus:outline-none" aria-label="Abrir menú">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <path d="M17 17l4 4M21 17l-4 4"/>
                </svg>
            </button>
        </nav>
    </header>

    <div id="mobile-menu" class="fixed inset-0 z-[60] opacity-0 invisible flex flex-col items-center justify-center">
        <button id="close-menu" class="absolute top-8 right-8 text-white hover:text-rs-red scale-150 transition-colors focus:outline-none">✕</button>
        <div class="space-y-10 text-center">
            <a href="#" class="block text-4xl font-display font-bold text-white hover:text-rs-red transition duration-300">Ecosistema</a>
            <a href="#" class="block text-4xl font-display font-bold text-white hover:text-rs-red transition duration-300">Plataforma</a>
            <a href="#" class="block text-4xl font-display font-bold text-white hover:text-rs-red transition duration-300">Contacto</a>
        </div>
    </div>

    <main class="bg-subtle-red relative min-h-screen flex flex-col items-center justify-center pt-32 md:pt-40 pb-10 px-6 text-center">
        
        <h1 id="hero-title" class="font-display text-4xl md:text-7xl font-bold tracking-tight text-white mb-6 leading-[1.1] max-w-4xl">
            Ecosistema Digital Que Vende.
        </h1>

        <p id="hero-desc" class="text-base md:text-lg text-gray-400 font-light mb-12 max-w-sm mx-auto leading-relaxed">
            Implementamos maquinaria de ventas automatizada para negocios...
        </p>

        <div class="flex flex-col md:flex-row gap-4 w-full max-w-[320px] md:max-w-md mb-20">
            <button onclick="handleGoogleSignIn()" class="flex-1 flex items-center justify-center gap-3 bg-white text-black py-4 rounded-lg text-sm font-bold shadow-lg transition hover:bg-gray-200">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 8.7 4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            
            <button onclick="openRegisterModal()" class="flex-1 py-4 rounded-lg text-sm font-semibold text-white transition bg-rs-gray border border-white/10 neon-border">
                Comenzar Gratis
            </button>
        </div>

        <div class="w-full max-w-4xl px-4 mt-auto mb-10">
            <p id="trust-text" class="text-xs uppercase tracking-[0.2em] text-gray-500 font-bold mb-8">
                Con la confianza de marcas...
            </p>
            
            <div class="w-full overflow-hidden relative">
                <div class="flex animate-bullet-train logo-track items-center">
                    
                    <div class="flex items-center gap-16 md:gap-24 px-4">
                        <img src="ruta/a/tu/logo-bross.png" alt="Bross" class="logo-item h-8 md:h-10 w-auto object-contain">
                        <img src="ruta/a/tu/logo-supabase.png" alt="Supabase" class="logo-item h-8 md:h-10 w-auto object-contain">
                        <img src="ruta/a/tu/logo-make.png" alt="Make" class="logo-item h-8 md:h-10 w-auto object-contain">
                        <img src="ruta/a/tu/logo-meta.png" alt="Meta" class="logo-item h-8 md:h-10 w-auto object-contain">
                        <img src="ruta/a/tu/logo-openai.png" alt="OpenAI" class="logo-item h-8 md:h-10 w-auto object-contain">
                    </div>
                    
                    <div class="flex items-center gap-16 md:gap-24 px-4">
                        <img src="ruta/a/tu/logo-bross.png" alt="Bross" class="logo-item h-8 md:h-10 w-auto object-contain">
                        <img src="ruta/a/tu/logo-supabase.png" alt="Supabase" class="logo-item h-8 md:h-10 w-auto object-contain">
                        <img src="ruta/a/tu/logo-make.png" alt="Make" class="logo-item h-8 md:h-10 w-auto object-contain">
                        <img src="ruta/a/tu/logo-meta.png" alt="Meta" class="logo-item h-8 md:h-10 w-auto object-contain">
                        <img src="ruta/a/tu/logo-openai.png" alt="OpenAI" class="logo-item h-8 md:h-10 w-auto object-contain">
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div id="register-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm hidden opacity-0 transition-opacity duration-300">
        <div class="bg-[#171717] border border-white/10 w-full max-w-sm p-8 rounded-2xl relative shadow-2xl">
            <button onclick="closeRegisterModal()" class="absolute top-4 right-4 text-gray-400 hover:text-rs-red transition-colors focus:outline-none">✕</button>
            <h2 id="modal-title" class="text-xl font-display font-bold mb-6 text-white text-center">Registro Ecosistema</h2>
            <form id="email-form" class="space-y-4" onsubmit="event.preventDefault();">
                <div>
                    <input type="email" required placeholder="Correo electrónico" class="w-full bg-[#0a0a0a] border border-white/10 p-3 rounded-lg text-white outline-none focus:border-rs-red transition-colors">
                </div>
                <div>
                    <input type="password" required placeholder="Contraseña segura" class="w-full bg-[#0a0a0a] border border-white/10 p-3 rounded-lg text-white outline-none focus:border-rs-red transition-colors">
                </div>
                <button type="submit" id="btn-submit" class="w-full py-3 bg-rs-red rounded-lg font-bold text-white hover:bg-opacity-90 transition-all shadow-lg shadow-rs-red/20">
                    Registrarse
                </button>
            </form>
        </div>
    </div>

    <script>
        const content = {
            es: { title: "Ecosistema Digital Que Vende.", desc: "Implementamos maquinaria de ventas automatizada para negocios con resultados reales.", trust: "Con la confianza de marcas líderes en Colombia", modal: "Registro Ecosistema", btn: "Registrarse" },
            en: { title: "Digital Ecosystem That Sells.", desc: "We implement automated sales machinery for businesses with real results.", trust: "Trusted by leading brands in the market", modal: "Ecosystem Registration", btn: "Register" },
            pt: { title: "Ecossistema Digital Que Vende.", desc: "Implementamos maquinário de vendas automatizado para empresas com resultados reais.", trust: "Com a confiança de marcas líderes no mercado", modal: "Registro Ecossistema", btn: "Registrar-se" }
        };

        function changeLanguage(lang) {
            const data = content[lang];
            if (data) {
                document.getElementById('hero-title').innerText = data.title;
                document.getElementById('hero-desc').innerText = data.desc;
                document.getElementById('trust-text').innerText = data.trust;
                document.getElementById('modal-title').innerText = data.modal;
                document.getElementById('btn-submit').innerText = data.btn;
            }
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                const preloader = document.getElementById('preloader');
                preloader.classList.add('animate-fade-out');
                setTimeout(() => { preloader.style.display = 'none'; }, 600);
            }, 800);
        });

        // NAVBAR SCROLL MÁGICO
        const mainNav = document.getElementById('main-nav');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                mainNav.classList.remove('bg-transparent', 'py-4');
                mainNav.classList.add('bg-black/80', 'backdrop-blur-md', 'py-3', 'shadow-lg');
            } else {
                mainNav.classList.remove('bg-black/80', 'backdrop-blur-md', 'py-3', 'shadow-lg');
                mainNav.classList.add('bg-transparent', 'py-4');
            }
        });

        const menuTrigger = document.getElementById('menu-trigger');
        const mobileMenu = document.getElementById('mobile-menu');
        const closeMenu = document.getElementById('close-menu');

        menuTrigger.addEventListener('click', () => {
            mobileMenu.classList.remove('opacity-0', 'invisible');
            mobileMenu.classList.add('opacity-100', 'visible');
            document.body.style.overflow = 'hidden'; 
        });

        closeMenu.addEventListener('click', () => {
            mobileMenu.classList.remove('opacity-100', 'visible');
            mobileMenu.classList.add('opacity-0', 'invisible');
            document.body.style.overflow = 'auto'; 
        });

        function openRegisterModal() {
            const modal = document.getElementById('register-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeRegisterModal() {
            const modal = document.getElementById('register-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
            document.body.style.overflow = 'auto';
        }

        document.getElementById('register-modal').addEventListener('click', function(event) {
            if (event.target === this) { closeRegisterModal(); }
        });

        function handleGoogleSignIn() {
            console.log("Iniciando flujo de autenticación...");
            alert("Redirigiendo a Google Auth...");
        }
    </script>
</body>
</html>
