<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050505">
    <title>Ecosistema Central | Red Sapien</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23050505'/><text x='50%' y='54%' font-family='Arial, sans-serif' font-size='50' font-weight='900' fill='%23FF3C00' text-anchor='middle' dominant-baseline='central'>RS</text></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { sapien: '#FF3C00', carbon: '#050505', dark: '#0a0a0a' } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-carbon text-gray-100 min-h-screen flex flex-col font-inter overflow-hidden" id="body-container">

    <div id="rs-preloader" class="fixed inset-0 z-[9999] bg-carbon flex flex-col items-center justify-center transition-opacity duration-1000">
        <div class="relative flex items-center justify-center w-32 h-32 mb-10">
            <div class="absolute inset-0 border-t-4 border-sapien rounded-full animate-spin"></div>
            <img src="Logo-Red-Sapien.webp" alt="Red Sapien" class="w-20 h-20 object-contain z-10">
        </div>

        <div class="w-72">
            <div class="flex justify-between text-[10px] font-black text-gray-500 uppercase mb-2">
                <span id="loading-text">Iniciando...</span>
                <span id="loading-percent">0%</span>
            </div>
            <div class="h-1 bg-white/10 rounded-full">
                <div id="loading-bar" class="h-1 bg-sapien w-0 transition-all duration-500"></div>
            </div>
        </div>
    </div>

    <main class="flex-grow flex items-center justify-center p-6 opacity-0 transition-opacity duration-1000" id="main-content">
        <div class="w-full max-w-md bg-dark border border-white/10 rounded-2xl p-8 shadow-2xl">
            <h1 class="font-anton text-4xl text-white uppercase text-center mb-6">Conexión <span class="text-sapien">Central</span></h1>
            <form id="lead-form" class="space-y-4">
                <input type="email" id="user-email" required class="w-full bg-[#0f0f0f] border border-white/10 rounded-lg px-4 py-3 text-white focus:border-sapien outline-none" placeholder="ejemplo@redsapien.com">
                <button type="submit" id="submit-btn" class="w-full bg-sapien hover:bg-[#e63600] text-white font-bold py-3 rounded-lg transition-all uppercase">Sincronizar Ecosistema</button>
            </form>
            <div id="response-message" class="mt-4 text-sm font-semibold p-3 rounded-lg hidden text-center"></div>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const bar = document.getElementById('loading-bar');
            const txt = document.getElementById('loading-text');
            const pct = document.getElementById('loading-percent');
            
            const steps = [
                {w: '33%', t: 'Estableciendo enlace...', p: '33%'},
                {w: '66%', t: 'Verificando red...', p: '66%'},
                {w: '100%', t: 'Conectado', p: '100%'}
            ];

            steps.forEach((step, i) => {
                setTimeout(() => {
                    bar.style.width = step.w;
                    txt.innerText = step.t;
                    pct.innerText = step.p;
                    if(i === 2) {
                        setTimeout(() => {
                            document.getElementById('rs-preloader').style.opacity = '0';
                            document.getElementById('main-content').style.opacity = '1';
                            setTimeout(() => document.getElementById('rs-preloader').remove(), 1000);
                        }, 500);
                    }
                }, (i + 1) * 1000);
            });
        });

        // Supabase Logic
        const supabase = supabase.createClient("TU_URL", "TU_KEY");
        document.getElementById('lead-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabase.from('leads').insert([{ email: document.getElementById('user-email').value }]);
            const msg = document.getElementById('response-message');
            msg.innerText = error ? "Error de conexión" : "¡Conectado exitosamente!";
            msg.className = `mt-4 text-sm font-semibold p-3 rounded-lg text-center ${error ? 'bg-sapien/20' : 'bg-green-500/20'}`;
            msg.classList.remove('hidden');
        });
    </script>
</body>
</html>
