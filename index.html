<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Sapien - Ecosistema Central</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-xl font-black tracking-wider text-indigo-500">RED SAPIEN</span>
            </div>
            <nav class="hidden md:flex space-x-8 text-sm font-medium text-slate-400">
                <a href="#" class="hover:text-slate-100 transition">Dashboard</a>
                <a href="#" class="hover:text-slate-100 transition">Inversores</a>
                <a href="#" class="hover:text-slate-100 transition">Ecosistema</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-xl w-full bg-slate-800/50 border border-slate-700/50 rounded-2xl p-8 backdrop-blur-xl shadow-2xl text-center">
            
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400 mb-3">
                Ecosistema Digital Red Sapien
            </h1>
            
            <p class="text-slate-400 text-sm mb-8 leading-relaxed">
                Infraestructura base montada. Este módulo está preparado para integrarse con los flujos de automatización y persistencia de datos.
            </p>

            <form id="lead-form" class="space-y-4 text-left">
                <div>
                    <label for="user-email" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">
                        Correo de Acceso
                    </label>
                    <input type="email" id="user-email" required
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition" 
                        placeholder="ejemplo@redsapien.com">
                </div>
                
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 text-white font-semibold text-sm py-3 rounded-lg shadow-lg shadow-indigo-500/20 transition duration-300">
                    Probar Conexión Ecosistema
                </button>
            </form>

            <div id="response-message" class="mt-4 text-xs font-medium hidden"></div>

        </div>
    </main>

    <footer class="border-t border-slate-800 py-6 text-center text-xs text-slate-500">
        <p>&copy; 2026 Red Sapien. Todos los derechos reservados.</p>
    </footer>

    <script>

        console.log("Red Sapien Core Engine: Listo para inyección de datos.");

</body>
</html>
