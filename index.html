<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Configuración PWA / Estilo Móvil Nativo -->
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Ecosistema Central | Red Sapien</title>
    
    <!-- Favicon RS Oficial -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23050505'/><text x='50%' y='54%' font-family='Arial, sans-serif' font-size='50' font-weight='900' fill='%23FF3C00' text-anchor='middle' dominant-baseline='central'>RS</text></svg>">
    
    <!-- Fuentes de Marca -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { sapien: '#FF3C00', carbon: '#050505', dark: '#0a0a0a' },
                    fontFamily: { anton: ['Anton', 'sans-serif'], inter: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <!-- Motor Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-carbon text-gray-100 min-h-screen flex flex-col font-inter selection:bg-sapien selection:text-white overflow-hidden" id="body-container">

    <!-- ==========================================
         PRELOADER ÉLITE RED SAPIEN
         ========================================== -->
    <div id="rs-preloader" class="fixed inset-0 z-[9999] bg-carbon flex flex-col items-center justify-center transition-opacity duration-700 ease-in-out">
        
        <!-- Logo con Anillos de Carga -->
        <div class="relative flex items-center justify-center w-32 h-32 mb-10">
            <!-- Anillo Exterior Rápido -->
            <div class="absolute inset-0 border-t-2 border-sapien rounded-full animate-[spin_1s_linear_infinite] shadow-[0_0_15px_rgba(255,60,0,0.3)]"></div>
            <!-- Anillo Interior Lento -->
            <div class="absolute inset-3 border-r-2 border-white/20 rounded-full animate-[spin_2s_reverse_infinite]"></div>
            <!-- Núcleo Logo RS -->
            <div class="w-20 h-20 bg-dark rounded-full flex items-center justify-center text-sapien font-anton text-4xl shadow-[0_0_30px_rgba(255,60,0,0.15)] z-10">
                RS
            </div>
        </div>

        <!-- Barra de Progreso de 3 Fases -->
        <div class="w-72 max-w-[80vw]">
            <div class="flex justify-between text-[11px] text-gray-500 font-black uppercase tracking-widest mb-3 font-inter">
                <span id="loading-text" class="animate-pulse">Desplegando Infraestructura...</span>
                <span id="loading-percent" class="text-sapien">0%</span>
            </div>
            <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden relative">
                <!-- Barra que se llena -->
                <div id="loading-bar" class="absolute top-0 left-0 h-full bg-sapien w-0 transition-all duration-[600ms] ease-out shadow-[0_0_10px_rgba(255,60,0,0.8)]"></div>
            </div>
        </div>
    </div>
    <!-- ========================================== -->

    <!-- Navbar Minimalista -->
    <header class="border-b border-white/10 bg-carbon/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-sapien rounded flex items-center justify-center text-white font-anton text-lg leading-none pt-1">RS</div>
                <span class="font-anton text-xl tracking-wide text-white uppercase pt-1">Red Sapien</span>
            </div>
            <nav class="hidden md:flex space-x-6 text-sm font-semibold text-gray-400">
                <a href="#" class="hover:text-sapien transition">Terminal</a>
                <a href="#" class="hover:text-sapien transition">Métricas</a>
            </nav>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="flex-grow flex items-center justify-center p-6 relative">
        
        <!-- Efecto de fondo sutil -->
        <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(circle at 50% 0%, rgba(255, 60, 0, 0.08) 0%, transparent 60%);"></div>

        <div class="relative w-full max-w-md bg-dark border border-white/10 rounded-2xl p-8 shadow-2xl shadow-sapien/5 opacity-0 translate-y-4 transition-all duration-1000 ease-out" id="main-card">
            
            <div class="text-center mb-8">
                <h1 class="font-anton text-4xl text-white uppercase tracking-wide mb-2">
                    Conexión <span class="text-sapien">Central</span>
                </h1>
                <p class="text-gray-400 text-sm leading-relaxed">
                    Ingrese su correo operativo para enlazar este módulo con la base de datos maestra.
                </p>
            </div>

            <form id="lead-form" class="space-y-5 text-left">
                <div>
                    <label for="user-email" class="block text-[11px] font-black text-gray-500 uppercase tracking-widest mb-2">
                        Correo de Operaciones
                    </label>
                    <input type="email" id="user-email" required
                        class="w-full bg-[#0f0f0f] border border-white/10 rounded-lg px-4 py-3.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-sapien focus:ring-1 focus:ring-sapien transition" 
                        placeholder="ejemplo@redsapien.com">
                </div>
                
                <button type="submit" id="submit-btn"
                    class="w-full bg-sapien hover:bg-[#e63600] text-white font-bold text-sm py-4 rounded-lg shadow-lg shadow-sapien/20 transition-all active:scale-[0.98] uppercase tracking-wide">
                    Sincronizar Ecosistema ⚡
                </button>
            </form>

            <div id="response-message" class="mt-5 text-sm font-semibold p-4 rounded-lg hidden text-center border"></div>
        </div>
    </main>

    <footer class="border-t border-white/10 py-6 text-center text-xs font-semibold text-gray-600">
        <p>Red Sapien © 2026. Infraestructura desplegada.</p>
    </footer>

    <script>
        /* =======================================================
           LÓGICA DEL PRELOADER (MAQUINA DE VENTAS)
           ======================================================= */
        document.addEventListener("DOMContentLoaded", () => {
            const preloader = document.getElementById('rs-preloader');
            const loadingBar = document.getElementById('loading-bar');
            const loadingText = document.getElementById('loading-text');
            const loadingPercent = document.getElementById('loading-percent');
            const bodyContainer = document.getElementById('body-container');
            const mainCard = document.getElementById('main-card');

            // Fases exactas de carga para generar autoridad técnica
            const phases = [
                { width: '33%', text: 'Estableciendo Conexión...', percent: '33%', delay: 400 },
                { width: '66%', text: 'Verificando Módulos RS...', percent: '66%', delay: 1200 },
                { width: '100%', text: 'Ecosistema En Línea', percent: '100%', delay: 2000 }
            ];

            phases.forEach(phase => {
                setTimeout(() => {
                    loadingBar.style.width = phase.width;
                    loadingText.innerText = phase.text;
                    loadingPercent.innerText = phase.percent;
                }, phase.delay);
            });

            // Ocultar preloader y mostrar interfaz principal
            setTimeout(() => {
                preloader.style.opacity = '0';
                
                setTimeout(() => {
                    preloader.style.display = 'none';
                    bodyContainer.classList.remove('overflow-hidden');
                    // Animación de entrada de la tarjeta
                    mainCard.classList.remove('opacity-0', 'translate-y-4');
                }, 700); // Esperar a que la transición CSS termine
            }, 2700); // Tiempo total del preloader
        });

        /* =======================================================
           LÓGICA DE BASE DE DATOS (SUPABASE)
           ======================================================= */
        const SUPABASE_URL = "TU_SUPABASE_URL_AQUÍ";
        const SUPABASE_ANON_KEY = "TU_SUPABASE_ANON_KEY_AQUÍ";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const leadForm = document.getElementById('lead-form');
        const userEmailInput = document.getElementById('user-email');
        const responseMessage = document.getElementById('response-message');
        const submitBtn = document.getElementById('submit-btn');

        leadForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const email = userEmailInput.value.trim();
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="animate-pulse">SINCRONIZANDO...</span>`;
            submitBtn.classList.add('opacity-80');
            responseMessage.classList.add('hidden');

            try {
                const { data, error } = await supabase
                    .from('leads')
                    .insert([{ email: email }]);

                if (error) throw error;

                // Éxito
                responseMessage.innerHTML = "✅ Conexión establecida. Datos asegurados en el núcleo.";
                responseMessage.className = "mt-5 text-sm font-semibold p-4 rounded-lg bg-green-500/10 text-green-400 border border-green-500/20 text-center";
                responseMessage.classList.remove('hidden');
                leadForm.reset(); 

            } catch (error) {
                // Error
                console.error("Fallo de sincronización:", error);
                responseMessage.innerHTML = `❌ Error: ${error.message || 'Verifica la consola.'}`;
                responseMessage.className = "mt-5 text-sm font-semibold p-4 rounded-lg bg-sapien/10 text-sapien border border-sapien/20 text-center";
                responseMessage.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Sincronizar Ecosistema ⚡";
                submitBtn.classList.remove('opacity-80');
            }
        });
    </script>
</body>
</html>
